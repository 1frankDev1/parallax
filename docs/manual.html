<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuales Menutech</title>
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/img/Diseño%20sin%20título%20(8).png">
    <link rel="stylesheet" href="./assets/css/badge.css">
    <link rel="stylesheet" href="./assets/css/manual_modern.css">
    <!-- PDF.js para extracción y renderizado -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            color: #fff;
            background-color: #0f111a;
        }

        #manual-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }

        /* Sidebar Draggable Panel */
        #indexer-panel {
            user-select: none;
            position: absolute;
            top: 100px;
            left: 30px;
            width: 280px;
            background: rgba(30, 32, 48, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            transition: width 0.3s ease, height 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #indexer-header {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #indexer-header h3 {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: #ff9533;
            letter-spacing: 0.5px;
        }

        #collapse-btn {
            background: none;
            border: none;
            color: #ff9533;
            cursor: pointer;
            font-size: 1.5rem;
            font-family: 'Montserrat', sans-serif;
        }

        #indexer-content {
            padding: 15px;
            overflow-y: auto;
            flex-grow: 1;
            max-height: 70vh;
        }

        .index-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            font-family: 'Inter', sans-serif;
            color: #b0b3b8;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.03);
        }

        .index-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: translateX(5px);
        }

        .index-item.active {
            background: rgba(255, 149, 51, 0.15);
            border-left-color: #ff9533;
            color: #fff;
            font-weight: 600;
        }

        /* Main Content Area */
        #main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            background: transparent;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        /* Collapsed state */
        #indexer-panel.collapsed {
            width: 60px;
            height: 60px;
        }
        #indexer-panel.collapsed #indexer-content,
        #indexer-panel.collapsed #indexer-header h3 {
            display: none;
        }

        /* Utils */
        .loading-overlay {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            color: #ff9533;
            font-size: 2rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <menutech-navweb></menutech-navweb>
    <menutech-drawer id="main-drawer" class="hidden"></menutech-drawer>
    <menutech-themes></menutech-themes>
    <menutech-chatbot></menutech-chatbot>
    <menutech-tools></menutech-tools>

    <div id="time-lock-overlay" class="time-lock-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10001; color: white; justify-content: center; align-items: center; text-align: center;">
        <div>
            <h2>Fuera de Horario Laboral</h2>
            <p>El acceso está restringido a tu horario de trabajo. Por favor, vuelve más tarde.</p>
        </div>
    </div>

    <div id="manual-container">
        <!-- Indexer Sidebar -->
        <div id="indexer-panel">
            <div id="indexer-header">
                <h3>Manuales</h3>
                <button id="collapse-btn">−</button>
            </div>
            <div id="indexer-content">
                <!-- Titles dynamically populated -->
            </div>
        </div>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Content loaded here -->
        </main>
    </div>

    <!-- Navigation Overlay -->
    <div class="neo-nav-container">
        <button id="neoNavBack" class="neo-nav-btn">
            <svg viewBox="0 0 24 24" class="neo-nav-icon">
                <path d="M19 12H5m7-7l-7 7 7 7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <button id="neoNavHome" class="neo-nav-btn">
            <svg viewBox="0 0 24 24" class="neo-nav-icon">
                <path d="M3 11l9-7 9 7v8a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-4H9v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tiny-animate/1.1.0/tinyanimate.min.js"></script>
    <script src="./assets/js/badge.js"></script>
    <script src="https://menutech.xyz/menutechUI.min.js"></script>
    <script src="./assets/js/renderer.js"></script>
    <script>
        let supabase = null;
        let manualData = [];

        async function initSupabase() {
            try {
                const mod = await import("https://esm.sh/@supabase/supabase-js");
                supabase = mod.createClient(
                    "https://ojpyfjgkffmzwvukjagf.supabase.co",
                    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qcHlmamdrZmZtend2dWtqYWdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQxNDIwMzYsImV4cCI6MjA3OTcxODAzNn0.dlVYmoMumBse_O1PLBx0FeNITqY4YktefD6l_uonSgo"
                );
                return supabase;
            } catch (err) {
                console.error("Error al inicializar Supabase:", err);
                return null;
            }
        }

        function cleanText(text) {
            if (!text) return '';
            // Try modern Unicode property escapes first, fall back to broad range
            try {
                // Remove emojis and symbols
                let res = text.replace(/\p{Emoji_Presentation}/gu, '');
                res = res.replace(/\p{Emoji}/gu, '');
                // Also remove common decorative characters
                res = res.replace(/[\u2766\u2042\u2710-\u2712\u270E\u2B50\u2600-\u26FF]/g, '');
                return res.trim();
            } catch (e) {
                // Fallback for older environments
                return text.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF]|[\u2111-\u2BFF])/g, '')
                           .replace(/[\u2766\u2042\u2710-\u2712\u270E]/g, '')
                           .trim();
            }
        }

        function formatModernContent(text) {
            if (!text) return '';
            let cleaned = cleanText(text);

            const paragraphs = cleaned.split('\n').map(p => p.trim()).filter(p => p.length > 0);
            return paragraphs.map(p => `<p class="modern-text">${p}</p>`).join('');
        }

        async function loadContent() {
            const client = await initSupabase();
            if (!client) return;

            const { data, error } = await client
                .from('manual_content')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) {
                console.error("Error cargando manual_content:", error);
                return;
            }

            manualData = data;
            const indexerContent = document.getElementById('indexer-content');
            indexerContent.innerHTML = '';

            if (manualData.length === 0) {
                indexerContent.innerHTML = '<div class="index-item">Archivo vacío</div>';
                showWelcome();
                return;
            }

            manualData.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'index-item';
                itemDiv.innerText = cleanText(item.title);
                itemDiv.onclick = () => selectItem(index);
                indexerContent.appendChild(itemDiv);
            });

            showWelcome();
        }

        function showWelcome() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <div class="modern-container">
                    <div class="modern-card">
                        <h1 class="modern-header">Centro de Manuales Menutech</h1>
                        <p class="modern-text">
                            Bienvenido al centro de conocimiento. Aquí encontrarás todas las guías necesarias para dominar nuestras herramientas de manera eficiente.
                        </p>
                        <p class="modern-text">
                            Explora los <strong>manuales</strong> en el panel izquierdo para comenzar.
                        </p>
                        <div class="modern-divider"></div>
                    </div>
                </div>
            `;
        }

        async function selectItem(index) {
            const item = manualData[index];
            if (!item) return;

            document.querySelectorAll('.index-item').forEach((div, i) => {
                div.classList.toggle('active', i === index);
            });

            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '<div class="loading-overlay">Cargando...</div>';

            if (item.type === 'pdf') await renderPDF(item);
            else if (item.type === 'image') renderImage(item);
            else if (item.type === 'text') await renderText(item);
            else if (item.type === 'video') renderVideo(item);
            else showWelcome();
        }

        async function renderText(item) {
            let content = item.description || '';
            if (item.source_url) {
                try {
                    const res = await fetch(item.source_url);
                    if (res.ok) {
                        const txt = await res.text();
                        if (txt.length > 5) content = txt;
                    }
                } catch (e) {}
            }

            document.getElementById('main-content').innerHTML = `
                <div class="modern-container">
                    <div class="modern-card">
                        <h1 class="modern-header">${cleanText(item.title)}</h1>
                        ${formatModernContent(content)}
                    </div>
                </div>
            `;
        }

        function renderImage(item) {
            document.getElementById('main-content').innerHTML = `
                <div class="modern-container">
                    <div class="modern-card">
                        <h1 class="modern-header">${cleanText(item.title)}</h1>
                        <img src="${item.source_url}" class="modern-image">
                        <div class="modern-divider"></div>
                        ${formatModernContent(item.description)}
                    </div>
                </div>
            `;
        }

        async function renderPDF(item) {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <div class="modern-container">
                    <div class="modern-card">
                        <h1 class="modern-header">${cleanText(item.title)}</h1>
                        <div id="pdf-container"></div>
                    </div>
                </div>
            `;

            const container = document.getElementById('pdf-container');
            try {
                const pdf = await pdfjsLib.getDocument(item.source_url).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();

                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'modern-page';
                    pageDiv.innerHTML = `<div class="modern-page-header">Página ${i} / ${pdf.numPages}</div>`;

                    // Extract text
                    let lastY, pageText = '';
                    textContent.items.forEach(t => {
                        if (lastY !== undefined && Math.abs(lastY - t.transform[5]) > 10) pageText += '\n';
                        pageText += t.str;
                        lastY = t.transform[5];
                    });

                    const textContainer = document.createElement('div');
                    textContainer.innerHTML = formatModernContent(pageText);
                    pageDiv.appendChild(textContainer);

                    // Render page as image
                    const viewport = page.getViewport({ scale: 1.5 });
                    const canvas = document.createElement('canvas');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

                    const img = document.createElement('img');
                    img.src = canvas.toDataURL();
                    img.className = 'modern-image';
                    pageDiv.appendChild(img);

                    container.appendChild(pageDiv);

                    if (i < pdf.numPages) {
                        const div = document.createElement('div');
                        div.className = 'modern-divider';
                        container.appendChild(div);
                    }
                }
            } catch (e) {
                container.innerHTML = `<p class="modern-text">Error al cargar el PDF: ${e.message}</p>`;
            }
        }

        function renderVideo(item) {
            let videoHTML = '';
            if (item.source_url.includes('youtube.com') || item.source_url.includes('youtu.be')) {
                const id = item.source_url.includes('v=') ? item.source_url.split('v=')[1].split('&')[0] : item.source_url.split('/').pop();
                videoHTML = `<iframe src="https://www.youtube.com/embed/${id}" style="width:100%; aspect-ratio:16/9; border: none; border-radius: 12px;" allowfullscreen></iframe>`;
            } else {
                videoHTML = `<video controls style="width:100%; border: none; border-radius: 12px;"><source src="${item.source_url}"></video>`;
            }

            document.getElementById('main-content').innerHTML = `
                <div class="modern-container">
                    <div class="modern-card">
                        <h1 class="modern-header">${cleanText(item.title)}</h1>
                        ${videoHTML}
                        <div class="modern-divider"></div>
                        ${formatModernContent(item.description)}
                    </div>
                </div>
            `;
        }

        // DRAGGABLE Logic
        const panel = document.getElementById('indexer-panel');
        const header = document.getElementById('indexer-header');
        let isDragging = false, offX, offY;

        header.onmousedown = (e) => {
            isDragging = true;
            offX = e.clientX - panel.offsetLeft;
            offY = e.clientY - panel.offsetTop;
        };

        document.onmousemove = (e) => {
            if (isDragging) {
                panel.style.left = (e.clientX - offX) + 'px';
                panel.style.top = (e.clientY - offY) + 'px';
            }
        };

        document.onmouseup = () => isDragging = false;

        document.getElementById('collapse-btn').onclick = () => {
            panel.classList.toggle('collapsed');
            document.getElementById('collapse-btn').innerText = panel.classList.contains('collapsed') ? '+' : '−';
        };

        // NAV
        document.getElementById("neoNavBack").onclick = () => window.history.back();
        document.getElementById("neoNavHome").onclick = () => window.location.href = "index.html";

        loadContent();
    </script>
</body>
</html>
