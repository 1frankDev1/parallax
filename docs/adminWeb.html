<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Admin | Menutech</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap');

        :root {
            --orange: #ff9533;
            --bg: #0b0c10;
            --card: #14161d;
            --input: #1a1d26;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: #2d333f;
            --success: #10b981;
            --error: #ef4444;
            --dev: #8b5cf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* Modern Gradient Background */
        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 0% 0%, rgba(255, 149, 51, 0.12) 0%, transparent 40%), radial-gradient(circle at 100% 100%, rgba(255, 149, 51, 0.08) 0%, transparent 40%); }

        /* Auth Screen */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 24px; }
        .auth-card {
            background: var(--card); width: 100%; max-width: 440px; padding: 60px 45px; border-radius: 40px; border: 1px solid var(--border);
            box-shadow: 0 24px 64px -12px rgba(0,0,0,0.5); position: relative; text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .auth-card h2 { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 600; margin-bottom: 12px; color: #fff; }
        .auth-card p.lead { color: var(--text-dim); margin-bottom: 40px; font-size: 0.95rem; font-weight: 400; line-height: 1.6; }

        .group { margin-bottom: 24px; text-align: left; }
        .group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--orange); letter-spacing: 0.5px; margin-bottom: 10px; margin-left: 4px; opacity: 0.9; }
        input {
            width: 100%; background: var(--input); border: 1px solid var(--border); border-radius: 20px; padding: 18px 22px; color: #fff; font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 4px rgba(255, 149, 51, 0.08); }

        .btn-orange {
            width: 100%; padding: 20px; border-radius: 22px; border: none; background: var(--orange); color: #000; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); margin-top: 12px;
        }
        .btn-orange:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(255, 149, 51, 0.25); }

        .auth-nav { margin-top: 36px; display: flex; flex-direction: column; gap: 14px; }
        .link { background: none; border: none; color: var(--text-dim); font-size: 0.85rem; cursor: pointer; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .link:hover { color: var(--orange); }

        /* Main App */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 80px 24px; animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { text-align: center; margin-bottom: 72px; }
        header h1 { font-family: 'Outfit', sans-serif; font-size: 3.2rem; font-weight: 600; letter-spacing: -1.5px; margin-bottom: 6px; }
        header .tag { color: var(--orange); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 4px; opacity: 0.8; }

        .switcher-box { max-width: 400px; margin: 0 auto 60px auto; background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 24px; text-align: left; }
        .switcher-box label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--orange); text-transform: uppercase; margin-bottom: 10px; margin-left: 10px; }
        .switcher-box select { width: 100%; background: var(--input); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; color: #fff; font-size: 0.9rem; }

        .drop-zone {
            width: 100%; height: 260px; border-radius: 36px; border: 2px dashed var(--border); background: var(--card);
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 80px;
        }
        .drop-zone:hover { border-color: var(--orange); background: rgba(255, 149, 51, 0.03); transform: scale(1.01); }
        .drop-zone p { font-weight: 600; font-size: 1.1rem; color: #fff; }
        .drop-zone span { font-size: 0.85rem; color: var(--text-dim); margin-top: 10px; font-weight: 500; }

        .bento { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); grid-auto-rows: 300px; gap: 28px; }
        .card { position: relative; border-radius: 32px; overflow: hidden; background: var(--card); border: 1px solid var(--border); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .card:hover { transform: translateY(-10px); border-color: var(--orange); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .card:hover img { transform: scale(1.06); }

        .del-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.4s; backdrop-filter: blur(6px); }
        .card:hover .del-overlay { opacity: 1; }
        .btn-del { background: var(--error); color: #fff; border: none; padding: 16px 32px; border-radius: 18px; font-weight: 700; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
        .btn-del:hover { transform: scale(1.05); background: #ff5555; }

        .card.wide { grid-column: span 2; }
        .card.tall { grid-row: span 2; }
        .card.large { grid-column: span 2; grid-row: span 2; }

        #top-nav { position: fixed; top: 30px; right: 30px; background: rgba(20,22,29,0.7); backdrop-filter: blur(20px); padding: 14px 28px; border-radius: 24px; border: 1px solid var(--border); display: flex; align-items: center; gap: 24px; z-index: 5000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #user-email { font-weight: 700; font-size: 0.85rem; color: var(--orange); }
        .btn-logout { background: none; border: none; color: #fff; font-size: 0.8rem; font-weight: 600; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .btn-logout:hover { opacity: 1; color: var(--orange); }

        .loader { border: 3px solid rgba(255, 149, 51, 0.1); width: 28px; height: 28px; border-radius: 50%; border-left-color: var(--orange); animation: rotate 1s linear infinite; margin: 0 auto; }
        @keyframes rotate { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        @media (max-width: 640px) {
            header h1 { font-size: 2.6rem; }
            .bento { grid-template-columns: 1fr; grid-auto-rows: 320px; }
            .card.wide, .card.large { grid-column: span 1; }
            .card.tall, .card.large { grid-row: span 1; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <!-- Auth Module -->
    <div id="auth-overlay">
        <div class="auth-card" id="signin-box">
            <h2>Welcome back</h2>
            <p class="lead">Manage your gallery projects with ease.</p>
            <div class="group"><label>Email Address</label><input type="email" id="login-email" placeholder="you@domain.com"></div>
            <div class="group"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"></div>
            <button id="btn-signin" class="btn-orange">Sign In</button>
            <div id="login-msg" style="margin-top:20px; font-size: 0.85rem;"></div>
            <div class="auth-nav">
                <button class="link" onclick="toggleAuth('signup')">Don't have an account? Sign Up</button>
            </div>
        </div>

        <div class="auth-card hidden" id="signup-box">
            <h2>Get Started</h2>
            <p class="lead">Create your free Menutech gallery account.</p>
            <div class="group"><label>Email Address</label><input type="email" id="reg-email" placeholder="you@domain.com"></div>
            <div class="group"><label>Password</label><input type="password" id="reg-pass" placeholder="••••••••"></div>
            <button id="btn-signup" class="btn-orange">Create Account</button>
            <div id="reg-msg" style="margin-top:20px; font-size: 0.85rem;"></div>
            <div class="auth-nav">
                <button class="link" onclick="toggleAuth('signin')">Already have an account? Sign In</button>
            </div>
        </div>
    </div>

    <!-- Domain Init Flow -->
    <div id="domain-init-overlay" class="hidden">
        <div class="auth-card">
            <h2>Configuration</h2>
            <p class="lead" style="margin-bottom: 32px">Enter the domain where your gallery will live.</p>
            <div class="group"><label>Target Domain</label><input type="text" id="init-domain" placeholder="example.com"></div>
            <button id="btn-save-domain" class="btn-orange">Save Configuration</button>
            <div id="init-msg" style="margin-top:20px"></div>
        </div>
    </div>

    <div id="top-nav" class="hidden">
        <div id="user-email"></div>
        <button id="btn-console" class="btn-logout" style="margin-right: 15px; border-right: 1px solid var(--border); padding-right: 15px;">CONSOLE</button>
        <button id="btn-logout" class="btn-logout">Logout</button>
    </div>

    <div class="container hidden" id="main-app">
        <header>
            <div class="tag">Management Portal</div>
            <h1>Gallery Manager</h1>
            <p id="view-domain-title" style="font-weight: 700; color: var(--orange); font-size: 0.85rem; letter-spacing: 1px;"></p>
        </header>

        <!-- Admin/Dev account switcher -->
        <div id="account-switcher" class="switcher-box hidden">
            <label>Switch Project Context</label>
            <select id="owner-select">
                <option value="">Loading your own project...</option>
            </select>
        </div>

        <div class="drop-zone" id="drop-zone">
            <p>Upload Images</p>
            <span>Click to select or drag files here</span>
            <input type="file" id="file-input" class="hidden" accept="image/*" multiple>
        </div>

        <div id="upload-status" style="text-align:center; margin-bottom:40px; font-weight: 600; font-size: 0.9rem;"></div>
        <div class="bento" id="gallery-grid"></div>
    </div>

    <script>
        const URL = "https://eemqyrysdgasfjlitads.supabase.co";
        const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlbXF5cnlzZGdhc2ZqbGl0YWRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MjA0NDUsImV4cCI6MjA3OTcxODAzNn0.UiyZLqhXSQ1Z_FoL006PDrDYKXbr_pxCOugYTulhdPY";
        let sb = null, user = null, userRole = null, activeOwnerId = null, activeDomain = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const m = await import("https://esm.sh/@supabase/supabase-js");
            sb = m.createClient(URL, KEY);
            checkSession();
            initEvents();
        });

        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                user = session.user;
                const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
                userRole = profile.role;

                if (userRole === 'admin' || userRole === 'developer') {
                    document.getElementById('btn-console').classList.remove('hidden');
                    setupContextSwitcher();
                } else {
                    // Logic for owner
                    activeOwnerId = user.id;
                    activeDomain = profile.domain;
                    if (!activeDomain) showDomainSetup(); else showApp();
                }
            }
        }

        async function setupContextSwitcher() {
            const switcher = document.getElementById('account-switcher');
            const select = document.getElementById('owner-select');
            switcher.classList.remove('hidden');

            let owners = [];
            if (userRole === 'admin') {
                const { data } = await sb.from('profiles').select('*').eq('role', 'owner');
                owners = data || [];
            } else {
                const { data } = await sb.from('profiles').select('*').neq('id', user.id);
                owners = data || [];
            }

            select.innerHTML = '<option value="">-- Select a Client --</option>' +
                owners.map(o => `<option value="${o.id}" data-domain="${o.domain || ''}">${o.domain || o.id.substring(0,8)}</option>`).join('');

            // Check if context was passed from adminCustomer.html
            const passedId = sessionStorage.getItem('mt_edit_owner_id');
            if (passedId) {
                select.value = passedId;
                sessionStorage.removeItem('mt_edit_owner_id');
                switchContext(passedId);
            }

            select.onchange = () => switchContext(select.value);
            showApp();
        }

        function switchContext(ownerId) {
            if (!ownerId) return;
            const select = document.getElementById('owner-select');
            const option = select.options[select.selectedIndex];
            activeOwnerId = ownerId;
            activeDomain = option.getAttribute('data-domain');
            document.getElementById('view-domain-title').textContent = activeDomain || "No Domain Set";
            loadGallery();
        }

        function showDomainSetup() {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('domain-init-overlay').classList.remove('hidden');
        }

        function showApp() {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('domain-init-overlay').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('top-nav').classList.remove('hidden');
            document.getElementById('user-email').textContent = user.email;
            if (userRole === 'owner') {
                document.getElementById('view-domain-title').textContent = activeDomain;
                loadGallery();
            }
        }

        function toggleAuth(mode) {
            document.getElementById('signin-box').classList.add('hidden');
            document.getElementById('signup-box').classList.add('hidden');
            document.getElementById(mode + '-box').classList.remove('hidden');
        }

        function initEvents() {
            document.getElementById('btn-signin').onclick = signIn;
            document.getElementById('btn-signup').onclick = signUp;
            document.getElementById('btn-logout').onclick = () => { sb.auth.signOut(); location.reload(); };
            document.getElementById('btn-console').onclick = () => location.href = "adminCustomer.html";
            document.getElementById('btn-save-domain').onclick = saveDomain;

            const dz = document.getElementById('drop-zone'), fi = document.getElementById('file-input');
            dz.onclick = () => fi.click();
            fi.onchange = () => uploadFiles(fi.files);
            dz.ondragover = e => { e.preventDefault(); dz.style.borderColor = "var(--orange)"; };
            ['dragleave', 'dragend'].forEach(t => dz.addEventListener(t, () => dz.style.borderColor = "var(--border)"));
            dz.ondrop = e => { e.preventDefault(); dz.style.borderColor = "var(--border)"; if(e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files); };
        }

        async function signIn() {
            const e = document.getElementById('login-email').value, p = document.getElementById('login-pass').value, m = document.getElementById('login-msg');
            if (!e || !p) return;
            m.innerHTML = '<div class="loader"></div>';
            const { data, error } = await sb.auth.signInWithPassword({ email: e, password: p });
            if (error) { m.textContent = error.message; m.style.color = "var(--error)"; }
            else { location.reload(); }
        }

        async function signUp() {
            const e = document.getElementById('reg-email').value, p = document.getElementById('reg-pass').value, m = document.getElementById('reg-msg');
            if (!e || !p) return;
            m.innerHTML = '<div class="loader"></div>';
            const { error } = await sb.auth.signUp({ email: e, password: p });
            if (error) { m.textContent = error.message; m.style.color = "var(--error)"; }
            else { m.textContent = "Check email or sign in."; m.style.color = "var(--success)"; setTimeout(() => toggleAuth('signin'), 3000); }
        }

        async function saveDomain() {
            const v = document.getElementById('init-domain').value.trim(), m = document.getElementById('init-msg');
            if (!v) return;
            const { error } = await sb.from('profiles').upsert({ id: user.id, domain: v });
            if (error) { m.textContent = "Error saving domain."; m.style.color = "var(--error)"; }
            else { activeDomain = v; showApp(); }
        }

        async function uploadFiles(files) {
            if (!activeOwnerId) return alert("Select a project context first.");
            const s = document.getElementById('upload-status');
            s.innerHTML = '<div class="loader"></div><p style="margin-top:10px">Uploading...</p>';
            for (const f of files) {
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', 'Tragalero');
                const res = await fetch('https://api.cloudinary.com/v1_1/dbbjxhvz5/image/upload', { method: 'POST', body: fd });
                const d = await res.json();
                await sb.from('galeria').insert([{ user_id: activeOwnerId, domain: activeDomain || 'undetermined', image_url: d.secure_url }]);
            }
            s.textContent = "Done"; setTimeout(() => s.textContent = "", 3000); loadGallery();
        }

        async function loadGallery() {
            if (!activeOwnerId) return;
            const g = document.getElementById('gallery-grid');
            const { data } = await sb.from('galeria').select('*').eq('user_id', activeOwnerId).order('created_at', { ascending: false });
            g.innerHTML = (data || []).map((it, i) => `
                <div class="card ${getBento(i)}">
                    <img src="${it.image_url}" loading="lazy">
                    <div class="del-overlay"><button class="btn-del" onclick="deleteImage('${it.id}')">Delete</button></div>
                </div>
            `).join('');
        }
        function getBento(i) { const p = ['', 'wide', 'tall', '', 'large', '', 'wide', '']; return p[i % p.length]; }
        window.deleteImage = async (id) => { if(confirm("Confirm deletion?")) { await sb.from('galeria').delete().eq('id', id); loadGallery(); } };
    </script>
</body>
</html>
