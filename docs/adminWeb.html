<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Galería - Menutech</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700&display=swap');

        :root {
            --bg-color: #0f111a;
            --card-bg: #1c1f2b;
            --text-color: #e6e6e6;
            --primary-color: #ff9533;
            --border-color: #30363d;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --success-color: #238636;
            --danger-color: #da3633;
            --glass-bg: rgba(28, 31, 43, 0.7);
        }

        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(255, 149, 51, 0.05), transparent),
                              radial-gradient(circle at bottom left, rgba(255, 149, 51, 0.05), transparent);
        }

        .container { width: 100%; max-width: 1100px; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 2.8rem; margin-bottom: 10px; color: white; letter-spacing: -1px; }

        /* Auth UI */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
        .login-card {
            background: var(--card-bg); padding: 50px 40px; border-radius: 24px; box-shadow: 0 20px 50px var(--shadow-color);
            width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border-color); position: relative; overflow: hidden;
        }
        .login-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, transparent, var(--primary-color), transparent); }
        .login-card h2 { font-family: 'Montserrat', sans-serif; font-size: 2rem; margin-bottom: 30px; color: white; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #8b949e; font-weight: 600; text-transform: uppercase; }
        input { width: 100%; padding: 14px; background: #0d1117; border: 1px solid var(--border-color); border-radius: 12px; color: white; box-sizing: border-box; font-size: 1rem; }
        .btn-primary { width: 100%; padding: 15px; background: var(--primary-color); color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-bottom: 15px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 149, 51, 0.4); }

        .auth-toggle { font-size: 0.9rem; color: #8b949e; cursor: pointer; text-decoration: underline; background: none; border: none; }
        .auth-toggle:hover { color: var(--primary-color); }

        /* Domain Init UI */
        #domain-init-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,17,26,0.95);
            display: flex; align-items: center; justify-content: center; z-index: 2500; backdrop-filter: blur(5px);
        }

        /* Dashboard Components */
        .drop-zone {
            width: 100%; height: 220px; padding: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: #8b949e; border: 2px dashed var(--primary-color); border-radius: 20px;
            transition: all 0.3s ease; background-color: var(--glass-bg); backdrop-filter: blur(10px); margin-bottom: 40px; box-sizing: border-box;
        }
        .drop-zone--over { border-style: solid; background-color: rgba(255, 149, 51, 0.15); transform: scale(1.01); }
        .drop-zone__input { display: none; }
        .drop-zone__icon { font-size: 3.5rem; }

        .bento-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); grid-auto-rows: 240px; gap: 20px; width: 100%; padding-bottom: 40px; }
        .bento-item { position: relative; border-radius: 16px; overflow: hidden; background: var(--card-bg); border: 1px solid var(--border-color); transition: all 0.4s; }
        .bento-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .bento-item:hover img { transform: scale(1.1); }
        .bento-item.large { grid-column: span 2; grid-row: span 2; }
        .bento-item.wide { grid-column: span 2; }
        .bento-item.tall { grid-row: span 2; }

        .delete-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;
        }
        .bento-item:hover .delete-overlay { opacity: 1; }
        .delete-btn { background: var(--danger-color); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 700; }

        #user-info {
            position: fixed; top: 20px; right: 20px; background: var(--glass-bg); padding: 12px 20px; border-radius: 14px;
            border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: flex-end; z-index: 2000; backdrop-filter: blur(10px);
        }
        #badge-username { font-weight: 700; color: var(--primary-color); }
        #logout-btn { background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 0.75rem; font-weight: 600; margin-top: 5px; }

        .spinner { border: 3px solid rgba(255, 149, 51, 0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: var(--primary-color); animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Auth Overlay -->
    <div id="login-overlay">
        <div class="login-card">
            <h2 id="auth-title">Acceso Clientes</h2>
            <div class="input-group"><label>Email</label><input type="email" id="auth-email" placeholder="email@ejemplo.com"></div>
            <div class="input-group"><label>Contraseña</label><input type="password" id="auth-pass" placeholder="********"></div>
            <button id="auth-btn" class="btn-primary">Entrar</button>
            <div id="auth-status" style="margin-top:15px"></div>
            <button id="auth-mode-toggle" class="auth-toggle">¿No tienes cuenta? Regístrate</button>
        </div>
    </div>

    <!-- Domain Init Overlay -->
    <div id="domain-init-overlay" class="hidden">
        <div class="login-card">
            <h2>Configurar Dominio</h2>
            <p style="margin-bottom: 20px; opacity: 0.8">Ingresa el dominio donde se mostrará la galería.</p>
            <div class="input-group"><label>Dominio</label><input type="text" id="init-domain" placeholder="ejemplo.com"></div>
            <button id="save-domain-btn" class="btn-primary">Guardar Configuración</button>
            <div id="init-status" style="margin-top:15px"></div>
        </div>
    </div>

    <!-- User Interface -->
    <div id="user-info" class="hidden">
        <div id="badge-username"></div>
        <button id="logout-btn">Cerrar Sesión</button>
    </div>

    <div class="container hidden" id="main-content">
        <header><h1>Mi Galería</h1><p id="domain-display" style="color:var(--primary-color); font-weight:600"></p></header>
        <div class="drop-zone" id="drop-zone">
            <div class="drop-zone__prompt"><span class="drop-zone__icon">🚀</span><span style="font-weight:600; font-size:1.3rem; color:white">Subir imágenes</span><span>Arrastra y suelta aquí o haz clic</span></div>
            <input type="file" id="file-input" class="drop-zone__input" accept="image/*" multiple>
        </div>
        <div id="upload-status" style="text-align:center; margin-bottom:20px"></div>
        <div class="bento-grid" id="gallery-grid"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://eemqyrysdgasfjlitads.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlbXF5cnlzZGdhc2ZqbGl0YWRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MjA0NDUsImV4cCI6MjA4OTI5NjQ0NX0.UiyZLqhXSQ1Z_FoL006PDrDYKXbr_pxCOugYTulhdPY";
        let supabase = null;
        let currentUser = null;
        let userDomain = null;
        let isLoginMode = true;

        document.addEventListener('DOMContentLoaded', async () => {
            const mod = await import("https://esm.sh/@supabase/supabase-js");
            supabase = mod.createClient(SUPABASE_URL, SUPABASE_KEY);
            checkUser();
            setupEvents();
        });

        async function checkUser() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                await fetchProfile();
            }
        }

        async function fetchProfile() {
            const { data, error } = await supabase.from('profiles').select('domain').eq('id', currentUser.id).single();
            if (data) {
                userDomain = data.domain;
                if (!userDomain) showDomainInit();
                else showContent();
            } else {
                showDomainInit();
            }
        }

        function showDomainInit() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('domain-init-overlay').classList.remove('hidden');
        }

        function showContent() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('domain-init-overlay').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('badge-username').textContent = currentUser.email;
            document.getElementById('domain-display').textContent = userDomain;
            loadGallery();
        }

        function setupEvents() {
            document.getElementById('auth-btn').onclick = handleAuth;
            document.getElementById('auth-mode-toggle').onclick = toggleAuthMode;
            document.getElementById('logout-btn').onclick = () => { supabase.auth.signOut(); location.reload(); };
            document.getElementById('save-domain-btn').onclick = saveDomain;

            const dz = document.getElementById('drop-zone');
            const fi = document.getElementById('file-input');
            dz.onclick = () => fi.click();
            fi.onchange = () => handleUpload(fi.files);
            dz.ondragover = e => { e.preventDefault(); dz.classList.add('drop-zone--over'); };
            ['dragleave', 'dragend'].forEach(t => dz.addEventListener(t, () => dz.classList.remove('drop-zone--over')));
            dz.ondrop = e => { e.preventDefault(); dz.classList.remove('drop-zone--over'); if(e.dataTransfer.files.length) handleUpload(e.dataTransfer.files); };
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').textContent = isLoginMode ? "Acceso Clientes" : "Crear Cuenta";
            document.getElementById('auth-btn').textContent = isLoginMode ? "Entrar" : "Registrarse";
            document.getElementById('auth-mode-toggle').textContent = isLoginMode ? "¿No tienes cuenta? Regístrate" : "¿Ya tienes cuenta? Entra";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const st = document.getElementById('auth-status');
            if (!email || !pass) { st.textContent = "Completa todos los campos"; return; }

            st.innerHTML = '<div class="spinner"></div>';

            if (isLoginMode) {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
                if (error) { st.textContent = "Error: " + error.message; st.style.color = "var(--danger-color)"; }
                else { currentUser = data.user; await fetchProfile(); }
            } else {
                const { data, error } = await supabase.auth.signUp({ email, password: pass });
                if (error) { st.textContent = "Error: " + error.message; st.style.color = "var(--danger-color)"; }
                else {
                    st.textContent = "¡Cuenta creada! Revisa tu email (si aplica) o intenta entrar.";
                    st.style.color = "var(--success-color)";
                    setTimeout(toggleAuthMode, 2000);
                }
            }
        }

        async function saveDomain() {
            const domain = document.getElementById('init-domain').value.trim();
            const st = document.getElementById('init-status');
            if (!domain) return;
            st.innerHTML = '<div class="spinner"></div>';
            const { error } = await supabase.from('profiles').upsert({ id: currentUser.id, domain: domain });
            if (error) { st.textContent = "Error al guardar: " + error.message; st.style.color = "var(--danger-color)"; }
            else { userDomain = domain; showContent(); }
        }

        async function handleUpload(files) {
            const st = document.getElementById('upload-status');
            st.innerHTML = '<div class="spinner"></div>';
            for (const f of files) {
                const url = await uploadCloudinary(f);
                await supabase.from('galeria').insert([{ user_id: currentUser.id, domain: userDomain, image_url: url }]);
            }
            st.textContent = "¡Subida completada!";
            setTimeout(() => st.textContent = "", 3000);
            loadGallery();
        }

        async function uploadCloudinary(f) {
            const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', 'Tragalero');
            const res = await fetch('https://api.cloudinary.com/v1_1/dbbjxhvz5/image/upload', { method: 'POST', body: fd });
            const data = await res.json(); return data.secure_url;
        }

        async function loadGallery() {
            const grid = document.getElementById('gallery-grid');
            const { data } = await supabase.from('galeria').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            grid.innerHTML = (data || []).map((it, i) => `
                <div class="bento-item ${getPattern(i)}">
                    <img src="${it.image_url}" loading="lazy">
                    <div class="delete-overlay"><button class="delete-btn" onclick="deleteImg('${it.id}')">Eliminar</button></div>
                </div>
            `).join('');
        }
        function getPattern(i) { const p = ['', 'wide', 'tall', '', 'large', '', 'wide', '']; return p[i % p.length]; }
        window.deleteImg = async (id) => { if(confirm("¿Eliminar?")) { await supabase.from('galeria').delete().eq('id', id); loadGallery(); } };
    </script>
</body>
</html>
